name: Release VPM Package

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: com.unitt.avatar-mod
      PACKAGE_PATH: Packages/com.unitt.avatar-mod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create package zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="${PACKAGE_NAME}-${VERSION}.zip"
          cd "${PACKAGE_PATH}"
          zip -r "../../../${ZIP_NAME}" .
          cd -
          SHA256=$(sha256sum "${ZIP_NAME}" | cut -d' ' -f1)
          echo "$SHA256  ${ZIP_NAME}" > "${ZIP_NAME}.sha256"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "SHA256=${SHA256}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256

      - name: Update vpm/index.json
        run: |
          ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${ZIP_NAME}"
          PACKAGE_DESC=$(jq -r '.description' "${PACKAGE_PATH}/package.json")
          UNITY_VERSION=$(jq -r '.unity' "${PACKAGE_PATH}/package.json")
          VPM_DEPS=$(jq -c '.vpmDependencies // {}' "${PACKAGE_PATH}/package.json")
          jq \
            --arg version "$VERSION" \
            --arg name "$PACKAGE_NAME" \
            --arg url "$ZIP_URL" \
            --arg sha256 "$SHA256" \
            --arg unity "$UNITY_VERSION" \
            --arg desc "$PACKAGE_DESC" \
            --argjson deps "$VPM_DEPS" \
            '.packages[$name].versions[$version] = {
              "name": $name,
              "version": $version,
              "unity": $unity,
              "description": $desc,
              "url": $url,
              "sha256": $sha256,
              "vpmDependencies": $deps
            }' vpm/index.json > vpm/index.json.tmp
          mv vpm/index.json.tmp vpm/index.json

      - name: Deploy vpm/index.json to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./vpm
          destination_dir: vpm
          keep_files: false
