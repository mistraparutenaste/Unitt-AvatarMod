name: Release VPM Package

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: com.unitt.avatar-mod
      PACKAGE_PATH: Packages/com.unitt.avatar-mod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create package zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ZIP_NAME="${PACKAGE_NAME}-${VERSION}.zip"
          cd "${PACKAGE_PATH}"
          zip -r "../../../${ZIP_NAME}" .
          cd -
          sha256sum "${ZIP_NAME}" > "${ZIP_NAME}.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            com.unitt.avatar-mod-${{ github.ref_name }}.zip
            com.unitt.avatar-mod-${{ github.ref_name }}.zip.sha256
